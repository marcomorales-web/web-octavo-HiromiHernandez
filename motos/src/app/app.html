<div class="login-container">
  <div class="login-card page-entrada">
    <h3 class="login-title">CC MOTOS</h3>

    <img src="assets/moto_1.jpeg" />

    <form>
      <div class="form-group">
        <label>Correo</label>
        <input type="email" placeholder="correo@ejemplo.com" required />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" required />
      </div>

      <button type="button" class="btn-login">Iniciar sesión</button>

      <div class="footer">
        <a href="#">Crear cuenta</a>
      </div>
    </form>
  </div>
</div>

<img src="assets/moto_barra.jpeg" #moto class="moto" alt="Moto" />
