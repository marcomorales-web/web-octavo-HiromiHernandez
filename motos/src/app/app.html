<div class="login-container">
    <div class="login-card page-entrada">

      <h3 class="login-title">CC MOTOS</h3>

      <img src="../../src/assets/moto.1.jpeg" class="icono">

      <form>
        <div class="form-group">
          <label>Correo</label>
          <input type="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" required>
        </div>

        <button
          type="button"
          class="btn-login"

        >
          Iniciar sesión
        </button>

        <div class="footer">
          <a href="#">Crear cuenta</a>
        </div>
      </form>

    </div>
  </div>

  <img
    src="../../../public/moto.barra.jpeg"
    #moto
    class="moto"
    alt="Moto"
  />
